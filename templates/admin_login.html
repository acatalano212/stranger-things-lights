<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Special+Elite&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            color: #d4c5a0;
            font-family: 'Special Elite', cursive, monospace;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: #111;
            border: 1px solid #222;
            border-radius: 8px;
            padding: 40px 30px;
            max-width: 340px;
            width: 100%;
            text-align: center;
        }
        h1 {
            font-size: 1.3rem;
            color: #c0392b;
            letter-spacing: 3px;
            margin-bottom: 24px;
            text-shadow: 0 0 12px rgba(192, 57, 43, 0.4);
        }
        input[type="password"] {
            width: 100%;
            padding: 12px 14px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 4px;
            color: #d4c5a0;
            font-family: 'Special Elite', cursive;
            font-size: 1rem;
            text-align: center;
            letter-spacing: 4px;
            outline: none;
            margin-bottom: 16px;
        }
        input:focus {
            border-color: #c0392b;
            box-shadow: 0 0 12px rgba(192, 57, 43, 0.3);
        }
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(180deg, #8b1a1a, #5a1010);
            border: 1px solid #c0392b;
            border-radius: 4px;
            color: #d4c5a0;
            font-family: 'Special Elite', cursive;
            font-size: 0.95rem;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.2s;
        }
        button:hover {
            background: linear-gradient(180deg, #a52020, #6b1515);
            box-shadow: 0 0 15px rgba(192, 57, 43, 0.3);
        }
        .error {
            color: #e74c3c;
            font-size: 0.85rem;
            margin-bottom: 12px;
        }
        .back {
            display: block;
            margin-top: 20px;
            color: #555;
            text-decoration: none;
            font-size: 0.8rem;
        }
        .back:hover { color: #c0392b; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🔒 Admin</h1>
        {% if error %}
        <p class="error">{{ error }}</p>
        {% endif %}
        <form method="POST">
            <input type="password" name="password" placeholder="Password" autofocus>
            <button type="submit">Enter</button>
        </form>
        <a class="back" href="/">← Back</a>
    </div>
</body>
</html>
