<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Upside Down</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Special+Elite&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            color: #d4c5a0;
            font-family: 'Special Elite', cursive, monospace;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: hidden;
        }

        /* Flickering ambient glow */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(ellipse at center, rgba(180, 60, 20, 0.08) 0%, transparent 70%);
            pointer-events: none;
            animation: ambientFlicker 4s ease-in-out infinite alternate;
        }

        @keyframes ambientFlicker {
            0%, 100% { opacity: 0.3; }
            25% { opacity: 0.8; }
            50% { opacity: 0.5; }
            75% { opacity: 1.0; }
        }

        .container {
            max-width: 400px;
            width: 100%;
            text-align: center;
            position: relative;
            z-index: 1;
        }

        h1 {
            font-size: 1.8rem;
            color: #c0392b;
            text-transform: uppercase;
            letter-spacing: 6px;
            margin-bottom: 8px;
            text-shadow: 0 0 20px rgba(192, 57, 43, 0.5);
            animation: titleFlicker 3s ease-in-out infinite;
        }

        @keyframes titleFlicker {
            0%, 100% { opacity: 1; }
            92% { opacity: 1; }
            93% { opacity: 0.4; }
            94% { opacity: 1; }
            96% { opacity: 0.6; }
            97% { opacity: 1; }
        }

        .subtitle {
            font-size: 0.85rem;
            color: #666;
            letter-spacing: 3px;
            margin-bottom: 40px;
        }

        /* Christmas lights decoration along the top */
        .lights {
            display: flex;
            justify-content: center;
            gap: 18px;
            margin-bottom: 30px;
        }

        .light {
            width: 10px;
            height: 14px;
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            position: relative;
        }

        .light::before {
            content: '';
            position: absolute;
            top: -4px;
            left: 3px;
            width: 4px;
            height: 6px;
            background: #444;
            border-radius: 2px 2px 0 0;
        }

        .light:nth-child(1) { background: #ff3333; box-shadow: 0 0 10px #ff3333; animation: bulbGlow 2s ease-in-out 0.0s infinite alternate; }
        .light:nth-child(2) { background: #33cc33; box-shadow: 0 0 10px #33cc33; animation: bulbGlow 2s ease-in-out 0.3s infinite alternate; }
        .light:nth-child(3) { background: #ffaa00; box-shadow: 0 0 10px #ffaa00; animation: bulbGlow 2s ease-in-out 0.6s infinite alternate; }
        .light:nth-child(4) { background: #3388ff; box-shadow: 0 0 10px #3388ff; animation: bulbGlow 2s ease-in-out 0.9s infinite alternate; }
        .light:nth-child(5) { background: #ff3388; box-shadow: 0 0 10px #ff3388; animation: bulbGlow 2s ease-in-out 1.2s infinite alternate; }
        .light:nth-child(6) { background: #33cccc; box-shadow: 0 0 10px #33cccc; animation: bulbGlow 2s ease-in-out 1.5s infinite alternate; }
        .light:nth-child(7) { background: #ff6600; box-shadow: 0 0 10px #ff6600; animation: bulbGlow 2s ease-in-out 1.8s infinite alternate; }
        .light:nth-child(8) { background: #33ff33; box-shadow: 0 0 10px #33ff33; animation: bulbGlow 2s ease-in-out 2.1s infinite alternate; }

        @keyframes bulbGlow {
            0% { opacity: 0.4; filter: brightness(0.5); }
            100% { opacity: 1; filter: brightness(1.2); }
        }

        /* Wire connecting the lights */
        .wire {
            height: 2px;
            background: #333;
            margin: -24px 30px 20px 30px;
            border-radius: 1px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.9rem;
            color: #888;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        input[type="text"] {
            width: 100%;
            padding: 14px 16px;
            background: #111;
            border: 1px solid #333;
            border-radius: 4px;
            color: #d4c5a0;
            font-family: 'Special Elite', cursive, monospace;
            font-size: 1.2rem;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 4px;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        input[type="text"]:focus {
            border-color: #c0392b;
            box-shadow: 0 0 15px rgba(192, 57, 43, 0.3);
        }

        input[type="text"]::placeholder {
            color: #444;
            letter-spacing: 2px;
        }

        .char-count {
            font-size: 0.75rem;
            color: #555;
            margin-top: 6px;
            text-align: right;
        }

        .char-count.warning {
            color: #c0392b;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(180deg, #8b1a1a, #5a1010);
            border: 1px solid #c0392b;
            border-radius: 4px;
            color: #d4c5a0;
            font-family: 'Special Elite', cursive, monospace;
            font-size: 1rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        button:hover {
            background: linear-gradient(180deg, #a52020, #6b1515);
            box-shadow: 0 0 20px rgba(192, 57, 43, 0.4);
        }

        button:active {
            transform: scale(0.98);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .status {
            margin-top: 24px;
            padding: 12px;
            border-radius: 4px;
            font-size: 0.85rem;
            letter-spacing: 1px;
            min-height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .status.idle {
            background: rgba(255, 255, 255, 0.03);
            color: #555;
        }

        .status.sending {
            background: rgba(192, 57, 43, 0.1);
            color: #c0392b;
            animation: pulse 1.5s ease-in-out infinite;
        }

        .status.success {
            background: rgba(39, 174, 96, 0.1);
            color: #27ae60;
        }

        .status.error {
            background: rgba(192, 57, 43, 0.1);
            color: #e74c3c;
        }

        .status.displaying {
            background: rgba(255, 170, 0, 0.1);
            color: #ffaa00;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .footer {
            margin-top: 40px;
            font-size: 0.7rem;
            color: #333;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="lights">
            <div class="light"></div>
            <div class="light"></div>
            <div class="light"></div>
            <div class="light"></div>
            <div class="light"></div>
            <div class="light"></div>
            <div class="light"></div>
            <div class="light"></div>
        </div>
        <div class="wire"></div>

        <h1>The Upside Down</h1>
        <p class="subtitle">Send a message through the lights</p>

        <div class="input-group">
            <label>Your Message</label>
            <input type="text" id="messageInput" placeholder="TYPE HERE..."
                   maxlength="50" autocomplete="off" autocorrect="off"
                   autocapitalize="characters" spellcheck="false">
            <div class="char-count" id="charCount">0 / 50</div>
        </div>

        <button id="sendBtn" onclick="sendMessage()">
            ⚡ Send to the Upside Down ⚡
        </button>

        <div class="status idle" id="status">
            Waiting for your message...
        </div>

        <p class="footer">The lights are always watching</p>
    </div>

    <script>
        const input = document.getElementById('messageInput');
        const charCount = document.getElementById('charCount');
        const sendBtn = document.getElementById('sendBtn');
        const statusEl = document.getElementById('status');

        // Filter input to A-Z and spaces only
        input.addEventListener('input', function() {
            this.value = this.value.replace(/[^a-zA-Z ]/g, '').toUpperCase();
            const len = this.value.length;
            charCount.textContent = `${len} / 50`;
            charCount.className = len >= 45 ? 'char-count warning' : 'char-count';
        });

        // Submit on Enter key
        input.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') sendMessage();
        });

        function setStatus(text, className) {
            statusEl.textContent = text;
            statusEl.className = `status ${className}`;
        }

        async function sendMessage() {
            const msg = input.value.trim();
            if (!msg) {
                setStatus('Type a message first!', 'error');
                return;
            }

            sendBtn.disabled = true;
            setStatus('Sending to the Upside Down...', 'sending');

            try {
                const res = await fetch('/api/message', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: msg }),
                });
                const data = await res.json();

                if (data.success) {
                    setStatus(`"${msg}" is being spelled out on the wall...`, 'success');
                    input.value = '';
                    charCount.textContent = '0 / 50';

                    // Poll status until done
                    pollStatus();
                } else {
                    setStatus(data.error || 'Something went wrong', 'error');
                    sendBtn.disabled = false;
                }
            } catch (err) {
                setStatus('Connection failed — are you on the right network?', 'error');
                sendBtn.disabled = false;
            }
        }

        async function pollStatus() {
            const check = async () => {
                try {
                    const res = await fetch('/api/status');
                    const data = await res.json();

                    if (data.state === 'message') {
                        setStatus(`Displaying: "${data.message}"`, 'displaying');
                        setTimeout(check, 2000);
                    } else {
                        setStatus('Message delivered! The lights have spoken.', 'success');
                        sendBtn.disabled = false;
                        setTimeout(() => setStatus('Waiting for your message...', 'idle'), 5000);
                    }
                } catch {
                    sendBtn.disabled = false;
                    setStatus('Waiting for your message...', 'idle');
                }
            };
            setTimeout(check, 3000);
        }

        // Initial status check
        fetch('/api/status').then(r => r.json()).then(data => {
            if (data.state === 'message') {
                setStatus(`Currently displaying: "${data.message}"`, 'displaying');
                sendBtn.disabled = true;
                pollStatus();
            }
        }).catch(() => {});
    </script>
</body>
</html>
